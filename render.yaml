services:
  - type: web
    name: nego-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node scripts/start.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHECKOUT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false          # optional — leave blank to use WooCommerce
      - key: DEFAULT_STORE_URL
        sync: false
