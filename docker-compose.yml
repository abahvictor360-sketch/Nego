version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nego
      POSTGRES_PASSWORD: nego_dev_password
      POSTGRES_DB: negodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nego -d negodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nego:nego_dev_password@postgres:5432/negodb
      PORT: 3001
      NODE_ENV: production
      # Fill these in a .env file or set them explicitly:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CHECKOUT_SECRET: ${CHECKOUT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      DEFAULT_STORE_URL: ${DEFAULT_STORE_URL:-https://your-store.com}

volumes:
  postgres_data:
