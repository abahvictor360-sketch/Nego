version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nego
      POSTGRES_PASSWORD: nego_dev_password
      POSTGRES_DB: negodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nego -d negodb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
